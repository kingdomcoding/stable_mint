services:
  api:
    build: .
    ports:
      - "4400:4400"
    environment:
      DATABASE_URL: ecto://stable_mint:stable_mint@shared-postgres/stable_mint_dev
      SECRET_KEY_BASE: "dev-only-secret-key-base-that-is-at-least-64-bytes-long-for-phoenix"
      PHX_SERVER: "true"
      PHX_HOST: "localhost"
      PORT: "4400"
    restart: unless-stopped
    networks:
      - shared_pg

  dashboard:
    build:
      context: ./dashboard
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: https://stablemint-api.josboxoffice.com/api
    depends_on:
      - api
    restart: unless-stopped

networks:
  shared_pg:
    external: true
